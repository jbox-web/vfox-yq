---
name: CI

permissions: {}

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  schedule:
    - cron: '0 4 1 * *'
  # Run workflow manually
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Test plugin
        run: mise run test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
